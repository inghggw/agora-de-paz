<svg width="1440" height="1080" viewBox="0 0 1440 1080" xmlns="http://www.w3.org/2000/svg" font-family="DejaVu Sans, Verdana, sans-serif">
  <!-- Fondo -->
  <rect width="1440" height="1080" fill="#F4F9F6"/>
  <rect width="1440" height="8" y="0" fill="#0E5A54"/>

  <!-- ENCABEZADO -->
  <g>
    <!-- Paloma de la paz (firma visual) -->
    <circle cx="120" cy="95" r="52" fill="#0E5A54"/>
    <g transform="translate(120,95)">
      <path d="M -30 8 C -18 -14, 2 -22, 16 -16 C 10 -26, 14 -32, 22 -30 L 30 -24 L 20 -20 C 26 -8, 20 8, 4 14 L 14 22 L -6 18 C -18 18, -26 14, -30 8 Z" fill="#FFFFFF"/>
      <path d="M -2 -10 C 6 -22, 20 -24, 26 -18 C 16 -16, 8 -12, 2 -4 Z" fill="#E8A93C"/>
    </g>
    <text x="200" y="82" font-size="46" font-weight="bold" fill="#0E5A54">Ágora de Paz</text>
    <text x="200" y="122" font-size="21" fill="#1D3330">¿Cómo funciona? El camino de una idea ciudadana hasta un gobierno que rinde cuentas.</text>
    <text x="200" y="150" font-size="16" fill="#5B7A73">Sin maquinarias políticas · Sin publicidad · Todo público y auditable</text>
  </g>

  <!-- ===== FILA 1 (pasos 1 a 4, izquierda a derecha) ===== -->
  <!-- PASO 1: Conversa -->
  <g transform="translate(60,210)">
    <rect width="300" height="270" rx="16" fill="#FFFFFF" stroke="#D8E6E0" stroke-width="2"/>
    <circle cx="40" cy="40" r="20" fill="#E8A93C"/>
    <text x="40" y="48" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">1</text>
    <circle cx="150" cy="80" r="36" fill="#0E5A54"/>
    <g stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 132 66 h 36 a 6 6 0 0 1 6 6 v 18 a 6 6 0 0 1 -6 6 h -20 l -10 8 v -8 h -6 a 6 6 0 0 1 -6 -6 v -18 a 6 6 0 0 1 6 -6 Z"/>
    </g>
    <text x="150" y="150" font-size="21" font-weight="bold" fill="#0E5A54" text-anchor="middle">Conversa</text>
    <text x="150" y="180" font-size="15" fill="#1D3330" text-anchor="middle">Cualquier persona habla en un</text>
    <text x="150" y="202" font-size="15" fill="#1D3330" text-anchor="middle">chat sencillo sobre los problemas</text>
    <text x="150" y="224" font-size="15" fill="#1D3330" text-anchor="middle">de su ciudad. Con su nombre</text>
    <text x="150" y="246" font-size="15" fill="#1D3330" text-anchor="middle">o de forma anónima.</text>
  </g>

  <!-- Flecha 1→2 -->
  <g stroke="#0E5A54" stroke-width="4" fill="#0E5A54">
    <line x1="366" y1="345" x2="392" y2="345"/>
    <path d="M 392 337 L 406 345 L 392 353 Z" stroke="none"/>
  </g>

  <!-- PASO 2: Corte periódico -->
  <g transform="translate(413,210)">
    <rect width="300" height="270" rx="16" fill="#FFFFFF" stroke="#D8E6E0" stroke-width="2"/>
    <circle cx="40" cy="40" r="20" fill="#E8A93C"/>
    <text x="40" y="48" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">2</text>
    <circle cx="150" cy="80" r="36" fill="#0E5A54"/>
    <g stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="132" y="66" width="36" height="32" rx="4"/>
      <line x1="132" y1="76" x2="168" y2="76"/>
      <line x1="141" y1="60" x2="141" y2="68"/>
      <line x1="159" y1="60" x2="159" y2="68"/>
      <line x1="141" y1="86" x2="150" y2="86"/>
    </g>
    <text x="150" y="150" font-size="21" font-weight="bold" fill="#0E5A54" text-anchor="middle">Corte periódico</text>
    <text x="150" y="180" font-size="15" fill="#1D3330" text-anchor="middle">Cada semana o quincena se</text>
    <text x="150" y="202" font-size="15" fill="#1D3330" text-anchor="middle">recoge todo lo conversado</text>
    <text x="150" y="224" font-size="15" fill="#1D3330" text-anchor="middle">hasta ese momento, con</text>
    <text x="150" y="246" font-size="15" fill="#1D3330" text-anchor="middle">fechas claras para todos.</text>
  </g>

  <!-- Flecha 2→3 -->
  <g stroke="#0E5A54" stroke-width="4" fill="#0E5A54">
    <line x1="719" y1="345" x2="745" y2="345"/>
    <path d="M 745 337 L 759 345 L 745 353 Z" stroke="none"/>
  </g>

  <!-- PASO 3: La IA resume -->
  <g transform="translate(766,210)">
    <rect width="300" height="270" rx="16" fill="#FFFFFF" stroke="#D8E6E0" stroke-width="2"/>
    <circle cx="40" cy="40" r="20" fill="#E8A93C"/>
    <text x="40" y="48" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">3</text>
    <circle cx="150" cy="80" r="36" fill="#0E5A54"/>
    <g stroke="#FFFFFF" stroke-width="3.5" fill="none" stroke-linecap="round">
      <circle cx="150" cy="80" r="7" fill="#FFFFFF" stroke="none"/>
      <circle cx="132" cy="66" r="4.5" fill="#E8A93C" stroke="none"/>
      <circle cx="168" cy="66" r="4.5" fill="#E8A93C" stroke="none"/>
      <circle cx="132" cy="96" r="4.5" fill="#E8A93C" stroke="none"/>
      <circle cx="168" cy="96" r="4.5" fill="#E8A93C" stroke="none"/>
      <line x1="150" y1="80" x2="132" y2="66"/>
      <line x1="150" y1="80" x2="168" y2="66"/>
      <line x1="150" y1="80" x2="132" y2="96"/>
      <line x1="150" y1="80" x2="168" y2="96"/>
    </g>
    <text x="150" y="150" font-size="21" font-weight="bold" fill="#0E5A54" text-anchor="middle">La IA resume</text>
    <text x="150" y="180" font-size="15" fill="#1D3330" text-anchor="middle">Una inteligencia artificial lee</text>
    <text x="150" y="202" font-size="15" fill="#1D3330" text-anchor="middle">todas las conversaciones y</text>
    <text x="150" y="224" font-size="15" fill="#1D3330" text-anchor="middle">encuentra los acuerdos que</text>
    <text x="150" y="246" font-size="15" fill="#1D3330" text-anchor="middle">van naciendo entre la gente.</text>
  </g>

  <!-- Flecha 3→4 -->
  <g stroke="#0E5A54" stroke-width="4" fill="#0E5A54">
    <line x1="1072" y1="345" x2="1098" y2="345"/>
    <path d="M 1098 337 L 1112 345 L 1098 353 Z" stroke="none"/>
  </g>

  <!-- PASO 4: Filtro de bien común -->
  <g transform="translate(1119,210)">
    <rect width="300" height="270" rx="16" fill="#FFF9EE" stroke="#E8A93C" stroke-width="2.5"/>
    <circle cx="40" cy="40" r="20" fill="#E8A93C"/>
    <text x="40" y="48" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">4</text>
    <circle cx="150" cy="80" r="36" fill="#B87E1E"/>
    <g stroke="#FFFFFF" stroke-width="3.5" fill="none" stroke-linecap="round">
      <line x1="150" y1="60" x2="150" y2="98"/>
      <line x1="132" y1="66" x2="168" y2="66"/>
      <path d="M 132 66 l -7 14 h 14 Z" fill="#FFFFFF"/>
      <path d="M 168 66 l -7 14 h 14 Z" fill="#FFFFFF"/>
      <line x1="140" y1="100" x2="160" y2="100"/>
    </g>
    <text x="150" y="150" font-size="21" font-weight="bold" fill="#B87E1E" text-anchor="middle">Filtro de bien común</text>
    <text x="150" y="180" font-size="15" fill="#1D3330" text-anchor="middle">La pregunta clave: ¿esto</text>
    <text x="150" y="202" font-size="15" fill="#1D3330" text-anchor="middle">beneficia a la mayoría y reduce</text>
    <text x="150" y="224" font-size="15" fill="#1D3330" text-anchor="middle">la desigualdad? Si no, no avanza.</text>
    <text x="150" y="246" font-size="15" font-weight="bold" fill="#B87E1E" text-anchor="middle">El filtro es público y auditable.</text>
  </g>

  <!-- Flecha bajando 4→5 -->
  <g stroke="#0E5A54" stroke-width="4" fill="#0E5A54">
    <line x1="1269" y1="486" x2="1269" y2="516"/>
    <path d="M 1261 516 L 1269 530 L 1277 516 Z" stroke="none"/>
  </g>

  <!-- ===== FILA 2 (pasos 5 a 8, derecha a izquierda) ===== -->
  <!-- PASO 5: La gente vota -->
  <g transform="translate(1119,537)">
    <rect width="300" height="270" rx="16" fill="#FFFFFF" stroke="#D8E6E0" stroke-width="2"/>
    <circle cx="40" cy="40" r="20" fill="#E8A93C"/>
    <text x="40" y="48" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">5</text>
    <circle cx="150" cy="80" r="36" fill="#0E5A54"/>
    <g stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="130" y="78" width="40" height="24" rx="3"/>
      <line x1="142" y1="78" x2="158" y2="78"/>
      <path d="M 144 74 l 5 -14 l 12 4 l -5 12" />
      <path d="M 148 68 l 3 3 l 7 -7" stroke="#E8A93C"/>
    </g>
    <text x="150" y="150" font-size="21" font-weight="bold" fill="#0E5A54" text-anchor="middle">La gente vota</text>
    <text x="150" y="180" font-size="15" fill="#1D3330" text-anchor="middle">Los acuerdos propuestos se</text>
    <text x="150" y="202" font-size="15" fill="#1D3330" text-anchor="middle">aprueban o rechazan en</text>
    <text x="150" y="224" font-size="15" fill="#1D3330" text-anchor="middle">votación abierta. La ciudadanía</text>
    <text x="150" y="246" font-size="15" fill="#1D3330" text-anchor="middle">tiene la última palabra.</text>
  </g>

  <!-- Flecha 5→6 (hacia la izquierda) -->
  <g stroke="#0E5A54" stroke-width="4" fill="#0E5A54">
    <line x1="1112" y1="672" x2="1086" y2="672"/>
    <path d="M 1086 664 L 1072 672 L 1086 680 Z" stroke="none"/>
  </g>

  <!-- PASO 6: Queda registrado -->
  <g transform="translate(766,537)">
    <rect width="300" height="270" rx="16" fill="#FFFFFF" stroke="#D8E6E0" stroke-width="2"/>
    <circle cx="40" cy="40" r="20" fill="#E8A93C"/>
    <text x="40" y="48" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">6</text>
    <circle cx="150" cy="80" r="36" fill="#0E5A54"/>
    <g stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M 150 66 C 144 60, 132 60, 128 64 v 32 c 4 -4, 16 -4, 22 2"/>
      <path d="M 150 66 C 156 60, 168 60, 172 64 v 32 c -4 -4, -16 -4, -22 2"/>
      <line x1="150" y1="66" x2="150" y2="98"/>
    </g>
    <text x="150" y="150" font-size="21" font-weight="bold" fill="#0E5A54" text-anchor="middle">Queda registrado</text>
    <text x="150" y="180" font-size="15" fill="#1D3330" text-anchor="middle">Cada decisión se guarda en un</text>
    <text x="150" y="202" font-size="15" fill="#1D3330" text-anchor="middle">registro histórico y público:</text>
    <text x="150" y="224" font-size="15" fill="#1D3330" text-anchor="middle">la memoria de lo que la</text>
    <text x="150" y="246" font-size="15" fill="#1D3330" text-anchor="middle">ciudad decidió y cuándo.</text>
  </g>

  <!-- Flecha 6→7 -->
  <g stroke="#0E5A54" stroke-width="4" fill="#0E5A54">
    <line x1="759" y1="672" x2="733" y2="672"/>
    <path d="M 733 664 L 719 672 L 733 680 Z" stroke="none"/>
  </g>

  <!-- PASO 7: Candidatos alineados -->
  <g transform="translate(413,537)">
    <rect width="300" height="270" rx="16" fill="#FFFFFF" stroke="#D8E6E0" stroke-width="2"/>
    <circle cx="40" cy="40" r="20" fill="#E8A93C"/>
    <text x="40" y="48" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">7</text>
    <circle cx="150" cy="80" r="36" fill="#0E5A54"/>
    <g stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="144" cy="70" r="8"/>
      <path d="M 130 100 c 0 -10, 6 -16, 14 -16 c 8 0, 14 6, 14 16"/>
      <path d="M 160 76 l 5 5 l 10 -11" stroke="#E8A93C" stroke-width="4.5"/>
    </g>
    <text x="150" y="150" font-size="21" font-weight="bold" fill="#0E5A54" text-anchor="middle">Candidatos alineados</text>
    <text x="150" y="180" font-size="15" fill="#1D3330" text-anchor="middle">Personas postulan su hoja de vida.</text>
    <text x="150" y="202" font-size="15" fill="#1D3330" text-anchor="middle">Avanzan solo quienes cumplen los</text>
    <text x="150" y="224" font-size="15" fill="#1D3330" text-anchor="middle">acuerdos y no tienen líos con</text>
    <text x="150" y="246" font-size="15" fill="#1D3330" text-anchor="middle">lo público. Se avalan con firmas.</text>
  </g>

  <!-- Flecha 7→8 -->
  <g stroke="#0E5A54" stroke-width="4" fill="#0E5A54">
    <line x1="406" y1="672" x2="380" y2="672"/>
    <path d="M 380 664 L 366 672 L 380 680 Z" stroke="none"/>
  </g>

  <!-- PASO 8: El poder rota -->
  <g transform="translate(60,537)">
    <rect width="300" height="270" rx="16" fill="#FFFFFF" stroke="#D8E6E0" stroke-width="2"/>
    <circle cx="40" cy="40" r="20" fill="#E8A93C"/>
    <text x="40" y="48" font-size="22" font-weight="bold" fill="#FFFFFF" text-anchor="middle">8</text>
    <circle cx="150" cy="80" r="36" fill="#0E5A54"/>
    <g stroke="#FFFFFF" stroke-width="4" fill="none" stroke-linecap="round">
      <path d="M 168 74 a 19 19 0 1 0 2 12"/>
      <path d="M 162 62 L 172 74 L 158 76 Z" fill="#FFFFFF" stroke="none"/>
    </g>
    <text x="150" y="150" font-size="21" font-weight="bold" fill="#0E5A54" text-anchor="middle">El poder rota</text>
    <text x="150" y="180" font-size="15" fill="#1D3330" text-anchor="middle">Quien es elegido gobierna por un</text>
    <text x="150" y="202" font-size="15" fill="#1D3330" text-anchor="middle">tiempo definido y rinde cuentas</text>
    <text x="150" y="224" font-size="15" fill="#1D3330" text-anchor="middle">frente a los acuerdos. Nadie se</text>
    <text x="150" y="246" font-size="15" fill="#1D3330" text-anchor="middle">adueña de lo público.</text>
  </g>

  <!-- Flecha de ciclo 8 → 1 (el proceso vuelve a empezar) -->
  <g stroke="#7FB6C9" stroke-width="4" fill="none" stroke-dasharray="10 8">
    <path d="M 40 672 C 14 672, 14 345, 40 345"/>
  </g>
  <path d="M 40 337 L 54 345 L 40 353 Z" fill="#7FB6C9"/>
  <text x="26" y="516" font-size="14" fill="#4B7A8A" text-anchor="middle" transform="rotate(-90 26 516)">el ciclo continúa: las opiniones evolucionan</text>

  <!-- ===== PIE: los tres compromisos ===== -->
  <g transform="translate(0,850)">
    <text x="720" y="36" font-size="22" font-weight="bold" fill="#0E5A54" text-anchor="middle">Tres compromisos que nunca se negocian</text>

    <g transform="translate(120,60)">
      <rect width="360" height="110" rx="14" fill="#0E5A54"/>
      <text x="180" y="44" font-size="19" font-weight="bold" fill="#FFFFFF" text-anchor="middle">Todo es público</text>
      <text x="180" y="72" font-size="14.5" fill="#D9EAE5" text-anchor="middle">El código y las reglas están en internet:</text>
      <text x="180" y="92" font-size="14.5" fill="#D9EAE5" text-anchor="middle">cualquiera puede revisarlos y mejorarlos.</text>
    </g>

    <g transform="translate(540,60)">
      <rect width="360" height="110" rx="14" fill="#B87E1E"/>
      <text x="180" y="44" font-size="19" font-weight="bold" fill="#FFFFFF" text-anchor="middle">El bien común primero</text>
      <text x="180" y="72" font-size="14.5" fill="#FBEFD8" text-anchor="middle">Lo que solo enriquece a unos pocos</text>
      <text x="180" y="92" font-size="14.5" fill="#FBEFD8" text-anchor="middle">no pasa el filtro.</text>
    </g>

    <g transform="translate(960,60)">
      <rect width="360" height="110" rx="14" fill="#0E5A54"/>
      <text x="180" y="44" font-size="19" font-weight="bold" fill="#FFFFFF" text-anchor="middle">El poder es prestado</text>
      <text x="180" y="72" font-size="14.5" fill="#D9EAE5" text-anchor="middle">Los cargos son temporales, con rotación</text>
      <text x="180" y="92" font-size="14.5" fill="#D9EAE5" text-anchor="middle">y rendición de cuentas permanente.</text>
    </g>
  </g>

  <!-- Pie de página -->
  <text x="720" y="1052" font-size="14" fill="#5B7A73" text-anchor="middle">Ágora de Paz · Un proyecto para la humanidad · Piloto: Ibagué, Colombia · Código abierto (AGPL-3.0)</text>
</svg>
