services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      REPOSITORY_BACKEND: postgres
      DATABASE_URL: postgresql+psycopg://agora:agora@db:5432/agora_de_paz
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: llama3.1
    depends_on:
      - db
      - ollama

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: agora
      POSTGRES_PASSWORD: agora
      POSTGRES_DB: agora_de_paz
    ports:
      - "5432:5432"
    volumes:
      - agora_db_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - agora_ollama_data:/root/.ollama

volumes:
  agora_db_data:
  agora_ollama_data:
